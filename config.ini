; ============================================================
; КОНФИГУРАЦИОННЫЙ ФАЙЛ СИСТЕМЫ ИНВЕНТАРИЗАЦИИ
; Редактируйте значения ниже для настройки приложения
; ============================================================

[APP]
; Основные настройки приложения
company_name = АО "Авиаавтоматика" имени В.В. Тарасова  
version = 1.0.0                                        ; Версия приложения
app_title = Система инвентаризации завода               ; Название приложения
window_width = 1100                                    ; Ширина главного окна (в пикселях)
window_height = 700                                    ; Высота главного окна (в пикселях)
theme = light                                          ; Тема оформления (light/dark)
language = ru                                          ; Язык интерфейса (ru/en)
debug_mode = False                                     ; Режим отладки (True - показывать доп. информацию)

[DATABASE]
; Настройки базы данных
db_path = inventory.db                                 ; Путь к файлу базы данных SQLite
backup_on_exit = True                                  ; Создавать резервную копию при выходе
backup_folder = ./backups/                             ; Папка для хранения резервных копий
max_backups = 10                                       ; Максимальное количество хранимых копий

[AUTH]
; Настройки авторизации
require_auth = True                                    ; Включить/выключить авторизацию (True - требуется вход)
session_timeout = 30                                   ; Таймаут сессии в минутах (0 - без ограничения)
max_login_attempts = 3                                 ; Максимальное количество попыток входа
block_duration = 5                                     ; Длительность блокировки после превышения попыток (в минутах)
allow_registration = False                             ; Разрешить регистрацию новых пользователей
password_min_length = 6                                ; Минимальная длина пароля
password_require_numbers = True                        ; Требовать цифры в пароле
password_require_special = False                       ; Требовать спецсимволы в пароле

[USERS]
; ============================================================
; СПИСОК ПОЛЬЗОВАТЕЛЕЙ
; Формат: login = password|role|full_name|active
; Роли: admin, warehouse_manager, warehouse_worker, auditor, viewer
; active: True - активен, False - заблокирован
; ============================================================
admin = admin123|admin|Администратор Системы|True
user = user123|warehouse_worker|Иванов Иван Иванович|True
manager = manager123|warehouse_manager|Петров Сергей Николаевич|True
auditor = auditor123|auditor|Сидорова Анна Михайловна|True

[ROLES:admin]
; ============================================================
; ПРАВА ДОСТУПА ДЛЯ РОЛИ АДМИНИСТРАТОР
; True - доступ разрешён, False - доступ запрещён
; ============================================================
can_add_products = True        
can_edit_products = True       
can_delete_products = True     
can_view_inventory = True      
can_create_inventory = True    
can_edit_inventory = True      
can_delete_inventory = True    
can_view_reports = True        
can_export_data = True         
can_view_audit = True          
can_manage_users = True        
can_change_settings = True     

[ROLES:warehouse_manager]
; ============================================================
; ПРАВА ДОСТУПА ДЛЯ МЕНЕДЖЕРА СКЛАДА
; ============================================================
can_add_products = True
can_edit_products = True
can_delete_products = False
can_view_inventory = True
can_create_inventory = True
can_edit_inventory = True
can_delete_inventory = False
can_view_reports = True
can_export_data = True
can_view_audit = True
can_manage_users = False
can_change_settings = False

[ROLES:warehouse_worker]
; ============================================================
; ПРАВА ДОСТУПА ДЛЯ КЛАДОВЩИКА
; ============================================================
can_add_products = False
can_edit_products = False
can_delete_products = False
can_view_inventory = True
can_create_inventory = True
can_edit_inventory = True
can_delete_inventory = False
can_view_reports = True
can_export_data = True
can_view_audit = False
can_manage_users = False
can_change_settings = False

[ROLES:auditor]
; ============================================================
; ПРАВА ДОСТУПА ДЛЯ АУДИТОРА
; ============================================================
can_add_products = False
can_edit_products = False
can_delete_products = False
can_view_inventory = True
can_create_inventory = False
can_edit_inventory = False
can_delete_inventory = False
can_view_reports = True
can_export_data = True
can_view_audit = True
can_manage_users = False
can_change_settings = False

[ROLES:viewer]
; ============================================================
; ПРАВА ДОСТУПА ДЛЯ ГОСТЕВОГО ПОЛЬЗОВАТЕЛЯ (ТОЛЬКО ПРОСМОТР)
; ============================================================
can_add_products = False
can_edit_products = False
can_delete_products = False
can_view_inventory = True
can_create_inventory = False
can_edit_inventory = False
can_delete_inventory = False
can_view_reports = True
can_export_data = False
can_view_audit = False
can_manage_users = False
can_change_settings = False

[UI]
; Настройки интерфейса
font_family = Segoe UI          ; Шрифт интерфейса
font_size = 10                  ; Размер шрифта
primary_color = #2c3e50         ; Основной цвет (тёмно-синий)
secondary_color = #3498db       ; Вторичный цвет (голубой)
success_color = #27ae60         ; Цвет успешных операций (зелёный)
danger_color = #e74c3c          ; Цвет ошибок/опасности (красный)
warning_color = #f39c12         ; Цвет предупреждений (жёлтый)
background_color = #ecf0f1      ; Цвет фона
table_alternate_color = #f8f9fa ; Цвет чередующихся строк в таблице
status_bar_color = #2c3e50      ; Цвет нижней строки статуса
status_bar_text_color = #ffffff ; Цвет текста в строке статуса
show_tooltips = True            ; Показывать подсказки при наведении
animations = True               ; Включить анимации

[EXPORT]
; Настройки экспорта данных
export_path = ./exports/         ; Папка для экспорта файлов
default_format = csv             ; Формат экспорта по умолчанию (csv, xlsx, json)
available_formats = csv, xlsx, json  ; Доступные форматы экспорта
csv_delimiter = ;                ; Разделитель полей в CSV
csv_encoding = utf-8             ; Кодировка CSV файлов
include_timestamp = True         ; Добавлять дату/время в имя файла
auto_export_on_close = False     ; Автоматически экспортировать при закрытии

[LOGGING]
; Настройки логирования
log_to_file = True               ; Записывать логи в файл
log_file = inventory.log         ; Имя файла логов
log_level = INFO                 ; Уровень логирования (DEBUG/INFO/WARNING/ERROR)
log_console = True               ; Выводить логи в консоль
log_audit = True                 ; Логировать аудит действий
audit_log_in_db = True           ; Хранить аудит в базе данных

[REPORTS]
; Настройки отчётов
default_chart_type = bar         ; Тип графика по умолчанию (bar/pie/line)
show_legend = True               ; Показывать легенду на графиках
chart_colors = #3498db,#2ecc71,#e74c3c,#f39c12,#9b59b6  ; Цвета для графиков
dpi = 100                        ; Качество сохраняемых графиков (точек на дюйм)
save_charts = True               ; Сохранять графики в файлы
chart_save_path = ./charts/      ; Папка для сохранения графиков

[INTEGRATION]
; Настройки интеграции с внешними системами
enable_api = False               ; Включить REST API
api_port = 5000                  ; Порт для API
api_key = 12345                  ; Ключ API для авторизации
enable_import = True             ; Разрешить импорт данных
import_path = ./imports/         ; Папка для импорта
enable_export = True             ; Разрешить экспорт данных
auto_sync_on_start = False       ; Автосинхронизация при запуске
sync_interval = 3600             ; Интервал синхронизации (в секундах)

[NOTIFICATIONS]
; Настройки уведомлений
show_notifications = True        ; Показывать уведомления
notification_timeout = 5         ; Время показа уведомления (в секундах)
low_stock_threshold = True       ; Включить оповещение о низком остатке
low_stock_percentage = 20        ; Процент остатка для оповещения
notify_on_discrepancy = True     ; Оповещать о расхождениях при инвентаризации
email_notifications = False      ; Отправлять уведомления по email
smtp_server = smtp.gmail.com     ; SMTP сервер для email
smtp_port = 587                  ; Порт SMTP сервера
sender_email = notifications@company.ru  ; Email отправителя

[BACKUP]
; Настройки резервного копирования
auto_backup = True               ; Автоматическое резервное копирование
backup_interval = 86400          ; Интервал резервного копирования (в секундах = 24 часа)
backup_path = ./backups/         ; Папка для резервных копий
compress_backups = True          ; Сжимать резервные копии

[SECURITY]
; Настройки безопасности
encrypt_passwords = False        ; Шифровать пароли пользователей (True - хэшировать)
salt = my_salt_key_123           ; Соль для хэширования паролей
require_strong_password = True   ; Требовать сложный пароль
password_expiry_days = 90        ; Срок действия пароля (в днях)
lock_after_inactivity = True     ; Блокировать при бездействии
inactivity_minutes = 15          ; Время бездействия для блокировки (в минутах)

[PERFORMANCE]
; Настройки производительности
use_cache = True                 ; Использовать кэширование
cache_timeout = 300              ; Время жизни кэша (в секундах)
max_records_in_table = 1000      ; Максимальное количество записей в таблице
batch_size = 50                  ; Размер пакета для операций
limit_query_results = True       ; Ограничивать количество результатов запроса
max_query_results = 500          ; Максимальное количество результатов запроса